name: "API Gateway: CI/CD"

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  ci:
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-dotnet-ci.yml@master
    with:
      dotnet-version: '8.0.x'
      solution-path: 'src/Dragon.ApiGateway/Dragon.ApiGateway.csproj'
      # test-path: 'tests/Dragon.ApiGateway.Tests.csproj'  # Bật khi có test project
    secrets: inherit

  cd:
    needs: ci
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-docker-gitops.yml@master
    with:
      service-name: 'api-gateway'
      docker-context: '.'
      environment: 'develop'
    secrets: inherit
