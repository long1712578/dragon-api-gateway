name: Deploy Develop

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

env:
  SERVICE: api-gateway
  IMAGE_NAME: dragon-api-gateway
  IMAGE: ghcr.io/longpham1712578/dragon-api-gateway
  GITOPS_REPO: longpham1712578/dragon-k8s-config
  DOTNET_PROJECT: src/Dragon.ApiGateway/Dragon.ApiGateway.csproj
  ENVIRONMENT: develop

jobs:
  build-and-push:
    runs-on: [self-hosted, develop]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "${{ env.DOTNET_PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.DOTNET_PROJECT }}" --configuration Release --no-restore

      - name: Generate image tag
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="develop-${SHORT_SHA}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker login ghcr.io
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}" \
            -t "${{ env.IMAGE }}:develop-latest" \
            -f Dockerfile .

      - name: Push image
        run: |
          docker push "${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}"
          docker push "${{ env.IMAGE }}:develop-latest"

      - name: Cleanup local images
        if: always()
        run: docker image prune -f

  update-k8s-manifest:
    name: Update K8s Manifest
    needs: build-and-push
    runs-on: [self-hosted, develop]
    steps:
      - name: Clone k8s-config and update manifest
        shell: bash
        env:
          NEW_IMAGE: ${{ needs.build-and-push.outputs.full_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          TMPDIR=$(mktemp -d)
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git "${TMPDIR}"
          cd "${TMPDIR}"

          TARGET="deploy/develop/${{ env.SERVICE }}.yaml"
          sed -i "s|image: ghcr.io/longpham1712578/${{ env.IMAGE_NAME }}:.*|image: ${NEW_IMAGE}|g" "${TARGET}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${TARGET}"

          if git diff --staged --quiet; then
            echo "Image khong doi - bo qua commit."
          else
            git commit -m "deploy(develop): ${{ env.SERVICE }} -> ${IMAGE_TAG} by ${{ github.actor }}"
            for i in 1 2 3; do
              git push && break || (git pull --rebase && sleep $((i * 3)))
            done
          fi

          rm -rf "${TMPDIR}"

      - name: Job Summary
        run: |
          {
            echo "## Deploy Develop - ${{ env.SERVICE }}"
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ needs.build-and-push.outputs.full_image }}\` |"
            echo "| Triggered | \`${{ github.actor }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
